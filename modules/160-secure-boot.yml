name: sign-files
type: shell
commands:
  - sbctl sign -s /boot/vmlinuz-*
  - sbctl sign -s /boot/initramfs-*
  - mkdir -p /etc/fwupd
  - echo -e "[uefi_capsule]\nDisableShimForSecureBoot=true\n" >> /etc/fwupd/fwupd.conf
modules:
  - name: configure-keypair
    type: shell
    commands:
      - sbctl create-keys
      - sbctl enroll-keys --microsoft

  - name: install-sbctl
    type: shell
    commands:
      - pacman -Sy --noconfirm sbctl
